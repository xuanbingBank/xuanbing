<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All In One</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        background:
          radial-gradient(circle at top, #fdf4d7 0%, #f5efe3 35%, #ebe4d7 100%);
        color: #1f2933;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      #app {
        min-height: 100vh;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(560px, 100%);
        padding: 40px 32px;
        border-radius: 24px;
        background: rgba(255, 252, 246, 0.92);
        box-shadow: 0 20px 60px rgba(60, 44, 20, 0.14);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 2.8rem);
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./node_modules/vue/dist/vue.global.prod.js"></script>
    <script src="./dist/src/renderer.js"></script>
  </body>
</html>
