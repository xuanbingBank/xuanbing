<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/zh-CN/docs/Web/HTTP/CSP -->
    <style>
      :root {
        --menu-background-color:#888888;
        --menu-text-color:#000;
      }
      *{
        margin: 0;
        padding: 0;
      }
      a{
        text-decoration: none;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        align-content: center;
      }
      #menu {
        width: 100px;
        height: 300px;
        background-color: var(--menu-background-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        align-content: center;
      }
      #brightness{
        width: 100px;
        height: 100px;
        background-color: #888888;
        display: flex;
        flex-direction: column;
        align-items: center;
        align-content: center;
        appearance: slider-vertical;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div id="menu">
        <div id="index" >
          <i class=""></i>
          <a href="index.html">首页</a>
        </div>
        <div id="windows">
          <i class=""></i>
          <a href="">系统</a>
        </div>
        <div id="notes">
          <i class=""></i>
          <a href="">笔记</a>
      </div>
      <div id="setting">
        <i class=""></i>
        <a href="">设置</a>
      </div>
      </div>
      <div id="windows-setting">
        <div id="brightness">
          <div>亮度</div>
          <div>
            <input id="brightness" type="range" orient="vertical" min="0" max="100" value="50" />
        </div>
      </div>
    </div>

    <script></script>
  </body>
</html>
